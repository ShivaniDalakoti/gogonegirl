<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#E8F3F1" stroke="#2B7A78" stroke-width="2"/>

  <!-- Globe base (geometric circles) -->
  <circle cx="100" cy="95" r="50" fill="none" stroke="#2B7A78" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="95" r="35" fill="none" stroke="#2B7A78" stroke-width="1.5" opacity="0.2"/>

  <!-- Compass star points (geometric) -->
  <g stroke="#FF8C42" stroke-width="2" fill="none">
    <line x1="100" y1="45" x2="100" y2="55"/>
    <line x1="145" y1="100" x2="135" y2="100"/>
    <line x1="100" y1="155" x2="100" y2="145"/>
    <line x1="55" y1="100" x2="65" y2="100"/>
  </g>

  <!-- Compass diagonal points (geometric) -->
  <g stroke="#FF8C42" stroke-width="1.5" fill="none" opacity="0.7">
    <line x1="128" y1="67" x2="122" y2="73"/>
    <line x1="133" y1="133" x2="127" y2="127"/>
    <line x1="67" y1="128" x2="73" y2="122"/>
    <line x1="72" y1="72" x2="78" y2="78"/>
  </g>

  <!-- Passport/ticket element (geometric rectangles) -->
  <rect x="80" y="70" width="40" height="50" fill="none" stroke="#2B7A78" stroke-width="2" rx="3"/>
  <line x1="80" y1="80" x2="120" y2="80" stroke="#2B7A78" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="95" x2="120" y2="95" stroke="#2B7A78" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="110" x2="120" y2="110" stroke="#2B7A78" stroke-width="1" opacity="0.5"/>

  <!-- Woman silhouette (travel + empowerment) -->
  <g fill="#FF8C42">
    <!-- Head -->
    <circle cx="100" cy="60" r="6"/>
    <!-- Body (simplified, empowered stance) -->
    <path d="M 100 66 L 95 80 L 95 90 M 100 66 L 105 80 L 105 90" stroke="#FF8C42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Arms (raised - empowerment) -->
    <line x1="95" y1="72" x2="85" y2="65" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="105" y1="72" x2="115" y2="65" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Airplane wing accent (travel) -->
  <path d="M 75 95 Q 100 85 125 95" stroke="#FF8C42" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Text: Gone Girl -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2B7A78" letter-spacing="1">
    GONE GIRL
  </text>

  <!-- Decorative dots (geometric accent) -->
  <circle cx="140" cy="55" r="1.5" fill="#FF8C42" opacity="0.6"/>
  <circle cx="60" cy="55" r="1.5" fill="#FF8C42" opacity="0.6"/>
  <circle cx="145" cy="145" r="1.5" fill="#2B7A78" opacity="0.6"/>
  <circle cx="55" cy="145" r="1.5" fill="#2B7A78" opacity="0.6"/>
</svg>