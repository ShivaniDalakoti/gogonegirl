<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gone Girl - Women's Adventure Travel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette - Inspired by Kumaon Mountains */
            --color-primary-dark: #1b4d3e;
            --color-primary-main: #2d6a55;
            --color-primary-light: #4a8972;
            --color-primary-lighter: #6da389;

            --color-accent-orange: #d97f3e;
            --color-accent-orange-light: #e59556;
            --color-accent-orange-dark: #c76a2b;

            --color-neutral-slate: #4a5568;
            --color-neutral-slate-light: #718096;
            --color-neutral-slate-dark: #2d3748;

            --color-background: #f8f7f5;
            --color-background-secondary: #ffffff;
            --color-text-primary: #2d3748;
            --color-text-secondary: #4a5568;
            --color-text-light: #718096;

            /* Typography */
            --font-serif: "Crimson Text", serif;
            --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.125rem;
            --font-size-xl: 1.5rem;
            --font-size-2xl: 2rem;
            --font-size-3xl: 2.5rem;
            --font-size-4xl: 3rem;

            --line-height-tight: 1.2;
            --line-height-normal: 1.6;
            --line-height-relaxed: 1.8;

            /* Spacing System */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
            --spacing-3xl: 4rem;
            --spacing-4xl: 6rem;

            /* Border Radius */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 15px rgba(45, 55, 72, 0.12);
            --shadow-xl: 0 20px 25px rgba(45, 55, 72, 0.15);
            --shadow-none: none;

            /* Transitions */
            --transition-fast: 150ms ease-in-out;
            --transition-base: 200ms ease-in-out;
            --transition-slow: 300ms ease-in-out;

            /* Opacity */
            --opacity-disabled: 0.6;
            --opacity-hover: 0.8;
            --opacity-focus: 0.9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            color: var(--color-text-primary);
            background-color: var(--color-background);
            transition: background-color var(--transition-base);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-serif);
            color: var(--color-primary-dark);
            line-height: var(--line-height-tight);
            font-weight: 600;
            margin-bottom: var(--spacing-md);
        }

        h1 {
            font-size: var(--font-size-4xl);
            font-weight: 600;
        }

        h2 {
            font-size: var(--font-size-3xl);
        }

        h3 {
            font-size: var(--font-size-2xl);
        }

        h4 {
            font-size: var(--font-size-xl);
        }

        p {
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-md);
        }

        a {
            color: var(--color-primary-main);
            text-decoration: none;
            transition: color var(--transition-base);
        }

        a:hover {
            color: var(--color-accent-orange);
        }

        button, .btn {
            font-family: var(--font-sans);
            font-size: var(--font-size-base);
            padding: var(--spacing-md) var(--spacing-lg);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
            font-weight: 500;
        }

        .btn-primary {
            background-color: var(--color-primary-main);
            color: var(--color-background);
        }

        .btn-primary:hover {
            background-color: var(--color-primary-light);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: var(--color-accent-orange);
            color: var(--color-background);
        }

        .btn-secondary:hover {
            background-color: var(--color-accent-orange-light);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .card {
            background-color: var(--color-background-secondary);
            padding: var(--spacing-xl);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-base);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .accent-text {
            color: var(--color-accent-orange);
        }

        .primary-text {
            color: var(--color-primary-main);
        }

        .secondary-text {
            color: var(--color-text-secondary);
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-lg);
        }

        header {
            background-color: var(--color-background-secondary);
            box-shadow: var(--shadow-sm);
            padding: var(--spacing-lg) 0;
        }

        main {
            padding: var(--spacing-4xl) 0;
        }

        img {
            max-width: 100%;
            height: auto;
            margin: var(--spacing-lg) 0;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-base);
        }

        img:hover {
            box-shadow: var(--shadow-lg);
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(rgba(27, 77, 62, 0.5), rgba(27, 77, 62, 0.5)),
                        url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&h=900&fit=crop') center/cover no-repeat;
            background-attachment: fixed;
        }

        .hero-content {
            text-align: center;
            color: var(--color-background);
            z-index: 1;
            animation: fadeInDown 0.8s ease-out;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            color: var(--color-background);
            font-weight: 600;
            margin-bottom: var(--spacing-md);
            letter-spacing: -1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-tagline {
            font-family: var(--font-serif);
            font-size: clamp(1.25rem, 5vw, 2.5rem);
            color: var(--color-accent-orange);
            font-style: italic;
            font-weight: 400;
            margin-bottom: var(--spacing-3xl);
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }

        .hero .btn-primary {
            font-size: clamp(1rem, 2vw, 1.125rem);
            padding: clamp(0.75rem, 2vw, 1rem) clamp(1.5rem, 4vw, 2rem);
            background-color: var(--color-accent-orange);
            color: var(--color-background-secondary);
            border: 2px solid var(--color-accent-orange);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(217, 127, 62, 0.3);
        }

        .hero .btn-primary:hover {
            background-color: var(--color-accent-orange-dark);
            border-color: var(--color-accent-orange-dark);
            box-shadow: 0 12px 32px rgba(217, 127, 62, 0.5);
            transform: translateY(-4px);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                height: 100vh;
                background-attachment: scroll;
            }

            .hero h1 {
                margin-bottom: var(--spacing-sm);
            }

            .hero-tagline {
                margin-bottom: var(--spacing-2xl);
            }

            .hero-content {
                padding: var(--spacing-lg);
            }
        }

        @media (max-width: 480px) {
            .hero {
                min-height: 80vh;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero-tagline {
                font-size: 1.25rem;
                margin-bottom: var(--spacing-xl);
            }

            .hero .btn-primary {
                font-size: 0.95rem;
                padding: 0.75rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1>Gone Girl</h1>
            <p class="hero-tagline">Women Who Wander</p>
            <button class="btn btn-primary">Join the Next Escape</button>
        </div>
    </section>

    <main>
        <div class="container">
            <img src="Gone Girl Logo.png" alt="Gone Girl Logo">

            <h2>Welcome to Adventure</h2>
            <p>Discover the world's most breathtaking destinations crafted specifically for women travelers seeking authentic experiences, adventure, and meaningful connections.</p>

            <button class="btn btn-primary">Explore Destinations</button>
            <button class="btn btn-secondary">Learn More</button>
        </div>
    </main>
</body>
</html>
